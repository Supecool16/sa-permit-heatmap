name: Refresh San Antonio permits

on:
  workflow_dispatch:
  schedule:
    - cron: "15 8 1 * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh permit data
        run: node refresh-permits.mjs

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/san-antonio-permits.json
          git diff --cached --quiet && exit 0
          git commit -m "Refresh permit data"
          git push
